name: metrolife
description: "MetroLife - 香港生活管家 (HK Life Manager)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # 狀態管理
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  freezed_annotation: ^3.0.0

  # 本地數據庫 (Drift = 高級 SQLite ORM)
  drift: ^2.25.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.31

  # 本地存儲
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4

  # 網絡與 API
  dio: ^5.8.0
  retrofit: ^4.4.2

  # 地圖
  google_maps_flutter: ^2.12.3
  flutter_polyline_points: ^2.0.0
  geolocator: ^13.0.2

  # 健康數據 (HealthKit iOS + Health Connect Android)
  health: ^12.1.0

  # 背景執行 (Phase 5+ 才需要，暫時註解)
  # flutter_foreground_task: ^9.2.0
  # workmanager: ^0.5.2

  # 圖表與日曆
  fl_chart: ^0.71.0
  table_calendar: ^3.1.3

  # 工具
  units_converter: ^3.0.0
  confetti: ^0.8.0
  flutter_svg: ^2.1.0
  permission_handler: ^11.4.0
  android_intent_plus: ^5.3.0
  share_plus: ^10.1.4

  # 通知
  awesome_notifications: ^0.10.1

  # 文件選擇
  file_picker: ^8.1.7

  # 代碼生成
  json_annotation: ^4.9.0
  injectable: ^2.5.0
  get_it: ^8.0.3
  auto_route: ^10.0.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # 代碼生成引擎
  build_runner: ^2.4.15

  # Drift 生成器
  drift_dev: ^2.25.0

  # Freezed 生成器
  freezed: ^3.0.0

  # Retrofit 生成器
  retrofit_generator: ^10.2.0

  # Riverpod 生成器
  riverpod_generator: ^4.0.3

  # AutoRoute 生成器
  auto_route_generator: ^10.2.4

  # JSON 序列化
  json_serializable: ^6.9.5

  # 依賴注入
  injectable_generator: ^2.12.1

  # 靜態分析 (暫時停用，版本衝突)
  # custom_lint: ^0.8.1
  # riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/rabbit/
    - assets/fonts/

  generate: true
